services:
  - type: web
    name: derma-vision
    env: node
    buildCommand: npm install && npm run build
    startCommand: cd derma-vision && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

  - type: web
    name: backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
